<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje nová stránka</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0fdf4; /* Jemně zelenkavá, aby to ladilo k limetkám */
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 20px;
            border: 2px solid #22c55e;
            border-radius: 15px;
            background: white;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background-color: #22c55e;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #16a34a;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Vítej na mém rozcestníku!</h1>
        <p>Tato stránka mi trvala <strong>45 minut</strong> (včetně ladění designu).</p>
        <p>Slouží jako úvod k mému hlavnímu projektu o nejlepším ovoci na světě.</p>

        <a href="limetky.html" class="btn">Chci vidět limetky! 🍋</a>
    </div>

</body>
</html>
